<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Agent Second Brain</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-bold text-gray-900">Agent Second Brain</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-gray-600 hover:text-gray-800">Vault</a>
                    <a href="/settings" class="text-blue-600 hover:text-blue-800">Settings</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        <div class="px-4 py-6 sm:px-0">
            <h2 class="text-2xl font-semibold text-gray-800 mb-6">Model Configuration</h2>

            <div class="bg-white shadow sm:rounded-lg">
                <div class="px-4 py-5 sm:p-6">
                    <form action="/settings" method="POST">
                        <div class="grid grid-cols-1 gap-6">
                            <div>
                                <label for="model_base_url" class="block text-sm font-medium text-gray-700">Base URL</label>
                                <input type="text" name="model_base_url" id="model_base_url" value="{{ settings.get('model_base_url', '') }}"
                                    class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                                    placeholder="https://api.openai.com/v1 or http://localhost:11434/v1">
                                <p class="mt-2 text-sm text-gray-500">Leave empty for default OpenAI.</p>
                            </div>

                            <div>
                                <label for="model_api_key" class="block text-sm font-medium text-gray-700">API Key</label>
                                <input type="password" name="model_api_key" id="model_api_key" value="{{ settings.get('model_api_key', '') }}"
                                    class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                                    placeholder="sk-...">
                            </div>

                            <div>
                                <label for="model_name" class="block text-sm font-medium text-gray-700">Model Name</label>
                                <input type="text" name="model_name" id="model_name" value="{{ settings.get('model_name', 'gpt-4o-mini') }}"
                                    class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                                    placeholder="gpt-4o-mini, llama3, etc.">
                            </div>

                            <div class="pt-4">
                                <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                                    Save Settings
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
